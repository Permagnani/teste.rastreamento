<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Leitura por QR Code</title>

<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f6f9; }
button { padding:10px 15px; margin:10px 0; }
#reader { width:320px; margin-top:10px; }
table { width:100%; border-collapse:collapse; margin-top:20px; background:white; }
th, td { padding:10px; border:1px solid #ddd; text-align:center; }
th { background:#2c3e50; color:white; }
.lida { background:#d1fae5 !important; }
</style>
</head>
<body>

<h2>Leitura de Caixas por QR Code</h2>

<button onclick="iniciarLeitor()">Iniciar Câmera</button>

<div id="reader"></div>

<p><strong>Último QR lido:</strong> <span id="resultado">-</span></p>
<p><strong>Caixas lidas:</strong> <span id="contador">0</span></p>

<table>
<thead>
<tr>
<th>Selecionar</th>
<th>Código</th>
<th>Produto</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

<script>

// 🔹 LISTA DE CAIXAS
const caixas = [
  { codigo: "CX210", produto: "Produto da Caixa 210" },
  { codigo: "CX001", produto: "Polpa de Morango" },
  { codigo: "CX002", produto: "Polpa de Manga" },
  { codigo: "CX003", produto: "Polpa de Abacaxi" },
  { codigo: "CX004", produto: "Polpa de Goiaba" }
];

const lidas = new Set();

function carregarTabela() {
  const tbody = document.getElementById("tabela");
  caixas.forEach(c => {
    const tr = document.createElement("tr");
    tr.setAttribute("data-codigo", c.codigo);
    tr.innerHTML = `
      <td><input type="checkbox" id="check-${c.codigo}"></td>
      <td>${c.codigo}</td>
      <td>${c.produto}</td>
    `;
    tbody.appendChild(tr);
  });
}

function marcar(codigo) {

  if (lidas.has(codigo)) return;

  const checkbox = document.getElementById("check-" + codigo);
  const linha = document.querySelector(`tr[data-codigo='${codigo}']`);

  if (checkbox && linha) {
    checkbox.checked = true;
    linha.classList.add("lida");
    lidas.add(codigo);
    document.getElementById("contador").innerText = lidas.size;
  }
}

// 🔹 INICIAR LEITOR QR
function iniciarLeitor() {

  const html5QrCode = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {

    if (devices.length) {

      html5QrCode.start(
        devices[0].id,
        {
          fps: 10,
          qrbox: 250
        },
        (decodedText) => {

          const codigo = decodedText.trim().toUpperCase();

          document.getElementById("resultado").innerText = codigo;

          marcar(codigo);

        },
        (errorMessage) => {
          // Ignora falhas temporárias de leitura
        }
      );

    }
  }).catch(err => {
    alert("Erro ao acessar câmera");
  });
}

carregarTabela();

</script>

</body>
</html>
