<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Teste OCR - Leitura de Código</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f6f9; }
button { padding:10px 15px; margin:10px 0; }
video, canvas { width:320px; border:1px solid #ccc; }
table { width:100%; border-collapse:collapse; margin-top:20px; background:white; }
th, td { padding:10px; border:1px solid #ddd; text-align:center; }
th { background:#2c3e50; color:white; }
.lida { background:#d1fae5 !important; }
</style>
</head>
<body>

<h2>Teste OCR - Leitura de Código Impresso</h2>

<button onclick="iniciarCamera()">Iniciar Câmera</button>
<button onclick="capturar()">Capturar e Ler</button>

<br><br>

<video id="video" autoplay></video>
<canvas id="canvas" style="display:none;"></canvas>

<p><strong>Resultado OCR:</strong> <span id="resultado">-</span></p>
<p><strong>Caixas lidas:</strong> <span id="contador">0</span></p>

<table>
<thead>
<tr>
<th>Selecionar</th>
<th>Código</th>
<th>Produto</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

<script>
const caixas = [
  { codigo: "CX001", produto: "Polpa de Morango" },
  { codigo: "CX002", produto: "Polpa de Manga" },
  { codigo: "CX003", produto: "Polpa de Abacaxi" },
  { codigo: "CX004", produto: "Polpa de Goiaba" }
];

const lidas = new Set();

function carregarTabela() {
  const tbody = document.getElementById("tabela");
  caixas.forEach(c => {
    const tr = document.createElement("tr");
    tr.setAttribute("data-codigo", c.codigo);
    tr.innerHTML = `
      <td><input type="checkbox" id="check-${c.codigo}"></td>
      <td>${c.codigo}</td>
      <td>${c.produto}</td>
    `;
    tbody.appendChild(tr);
  });
}

async function iniciarCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }});
  document.getElementById("video").srcObject = stream;
}

async function capturar() {

  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  document.getElementById("resultado").innerText = "Lendo...";

  const { data: { text } } = await Tesseract.recognize(canvas, 'eng');

  console.log("OCR BRUTO:", text);

  const match = text.toUpperCase().match(/CX\d{3}/);

  if (match) {
    marcar(match[0]);
    document.getElementById("resultado").innerText = match[0];
  } else {
    document.getElementById("resultado").innerText = "Código não encontrado";
  }
}

function marcar(codigo) {

  if (lidas.has(codigo)) return;

  const checkbox = document.getElementById("check-" + codigo);
  const linha = document.querySelector(`tr[data-codigo='${codigo}']`);

  if (checkbox && linha) {
    checkbox.checked = true;
    linha.classList.add("lida");
    lidas.add(codigo);
    document.getElementById("contador").innerText = lidas.size;
  }
}

carregarTabela();
</script>

</body>
</html>
